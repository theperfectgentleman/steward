# Optional local / Dokploy Compose stack.
# Prefer Dokploy "Database" + "Application (Docker image)" instead of building on the VPS.
# This compose file only PULLS images — it does not build on the server.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-steward}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-stewarddb}
    volumes:
      - steward_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-steward} -d ${POSTGRES_DB:-stewarddb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    # Replace with your GHCR image after the first CI run:
    # ghcr.io/theperfectgentleman/steward:latest
    image: ${APP_IMAGE:-ghcr.io/theperfectgentleman/steward:latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-steward}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-stewarddb}?sslmode=disable
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      AI_PROVIDER_ORDER: ${AI_PROVIDER_ORDER:-groq,gemini}
      AI_MAX_PROMPT_CHARS: ${AI_MAX_PROMPT_CHARS:-3500}
      AI_MIN_REQUEST_INTERVAL_MS: ${AI_MIN_REQUEST_INTERVAL_MS:-4500}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}

volumes:
  steward_pg:
